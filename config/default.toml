[scoring]
penalty_strength = 0.35
uncertainty_strength = 0.25

[analysis]
tile_size_m = 500
# Set tile_step_m < tile_size_m for overlapping tiles.
tile_step_m = 500
min_tile_coverage = 0.20
min_valid_pixel_fraction = 0.30
min_adjusted_score = 0.30
max_candidates = 500
cluster_distance_m = 250
cluster_min_members = 1

[feature_engine]
anomaly_sigma_px = 2.0
dem_sigma_px = 3.0
anomaly_z_cap = 6.0
temporal_anomaly_z = 2.5
edge_sigma = 1.2
mask_quantile = 0.85

[context_layers]
relief_sigma_px = 8.0
curvature_sigma_px = 3.0
valley_sigma_px = 14.0
water_seed_quantile = 0.90
water_distance_scale_m = 1200
forest_threshold = 0.55
forest_smoothing_sigma_px = 1.2
disturbance_sigma_px = 1.4
disturbance_variance_sigma_px = 3.0
disturbance_canny_sigma = 1.0
disturbance_line_sigma_px = 2.0

[landscape_weights.steppe]
optical_anomaly = 0.9
sar_anomaly = 0.6
microrelief = 1.2
enclosure_shape = 1.1
linearity = 0.9
temporal_persistence = 1.0
historical_match = 1.0
contextual_fit = 0.8

[landscape_weights.valley]
optical_anomaly = 1.0
sar_anomaly = 0.7
microrelief = 0.8
enclosure_shape = 0.7
linearity = 1.0
temporal_persistence = 1.0
historical_match = 0.9
contextual_fit = 1.1

[landscape_weights.mountain]
optical_anomaly = 0.6
sar_anomaly = 0.8
microrelief = 1.0
enclosure_shape = 0.6
linearity = 0.7
temporal_persistence = 1.1
historical_match = 0.8
contextual_fit = 0.8

[landscape_weights.forest]
optical_anomaly = 0.3
sar_anomaly = 0.8
microrelief = 0.7
enclosure_shape = 0.4
linearity = 0.5
temporal_persistence = 0.8
historical_match = 0.5
contextual_fit = 0.6

[guardrails]
public_coordinate_blur_m = 5000
restricted_coordinate_blur_m = 1000
block_in_red_zones = true
# block | authorized-only | allow-all
red_zone_access = "authorized-only"
withhold_sensitive_candidates = true
