# Copy this file and adapt it for your chosen STAC endpoint and collections.
# The current code supports:
# - optical.output_kind = "ndvi" using asset_groups.red + asset_groups.nir
# - sar/dem/historical.output_kind = "single-band" using asset_groups.primary
#
# Notes:
# - Use STAC endpoints that expose public or pre-signed GeoTIFF/COG asset URLs.
# - If you use Microsoft Planetary Computer, set asset_href_signing = "planetary-computer".
# - Some providers expose searchable STAC metadata but protected asset HREFs; those require extra auth work.

[stac]
endpoint = "https://planetarycomputer.microsoft.com/api/stac/v1"
timeout_s = 120.0
max_pages = 10
asset_href_signing = "planetary-computer"
# headers = { Authorization = "Bearer ..." }

[target]
resolution_m = 30.0
resampling = "bilinear"
compress = "deflate"
nodata = -9999.0
# output_crs = "EPSG:32647"

[optical]
enabled = true
collection = "landsat-c2-l2"
datetime = "2024-05-01T00:00:00Z/2024-09-30T23:59:59Z"
max_items = 6
search_limit = 60
output_kind = "ndvi"
filename_template = "{date}_{item_id}.tif"
sort_by = "eo:cloud_cover"
sort_ascending = true

[[optical.filters]]
property = "eo:cloud_cover"
lte = 25.0

[optical.asset_groups]
red = ["red", "B04", "SR_B4"]
nir = ["nir08", "nir", "B08", "SR_B5"]

[sar]
enabled = false
collection = "sentinel-1-rtc"
datetime = "2024-05-01T00:00:00Z/2024-09-30T23:59:59Z"
max_items = 4
search_limit = 40
output_kind = "single-band"
filename_template = "{date}_{item_id}.tif"
sort_by = "datetime"
sort_ascending = false
resampling = "bilinear"
to_db = true

[[sar.filters]]
property = "sat:orbit_state"
eq = "ascending"

[sar.asset_groups]
primary = ["vv", "VV"]

[dem]
enabled = true
collection = "cop-dem-glo-30"
max_items = 4
search_limit = 20
output_kind = "single-band"
resampling = "bilinear"

[dem.asset_groups]
primary = ["data", "dem"]

[historical]
enabled = false
collection = ""
max_items = 0
search_limit = 0
output_kind = "single-band"

[historical.asset_groups]
primary = ["primary"]
